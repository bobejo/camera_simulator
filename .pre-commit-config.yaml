repos:
  - repo: local
    hooks:
      - id: hatch-fmt
        name: hatch fmt
        entry: hatch fmt
        language: system
        pass_filenames: false
        always_run: true
      - id: hatch-ty
        name: ty check
        entry: hatch run types:check
        language: system
        pass_filenames: false
        always_run: true
